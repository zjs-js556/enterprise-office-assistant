# Manual trigger — generates unsigned .ipa for 爱思助手 Apple ID signing
name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "App version override (leave empty for default from app.json)"
        required: false
        default: ""

env:
  APP_NAME: enterprise-office-assistant
  BUNDLE_ID: com.enterprise.office.assistant

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install npm dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Generate iOS native project (Expo prebuild)
        working-directory: mobile
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods dependencies
        working-directory: mobile/ios
        run: |
          if ! command -v pod &> /dev/null; then
            brew install cocoapods
          fi
          pod install

      - name: Detect workspace and scheme
        id: detect
        working-directory: mobile/ios
        run: |
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -1)

          if [ -n "$WORKSPACE" ]; then
            BUILD_ARG="-workspace $WORKSPACE"
            echo "use_workspace=true" >> $GITHUB_OUTPUT
            echo "workspace_path=$WORKSPACE" >> $GITHUB_OUTPUT
          elif [ -n "$PROJECT" ]; then
            BUILD_ARG="-project $PROJECT"
            echo "use_workspace=false" >> $GITHUB_OUTPUT
            echo "project_path=$PROJECT" >> $GITHUB_OUTPUT
          else
            echo "::error::No .xcworkspace or .xcodeproj found"
            exit 1
          fi

          SCHEMES=$(xcodebuild $BUILD_ARG -list -json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          ws = data.get('workspace', {})
          proj = data.get('project', {})
          for s in (ws.get('schemes', []) or proj.get('schemes', [])):
              print(s)
          ")

          SCHEME=$(echo "$SCHEMES" | grep -i "$APP_NAME" | head -1)
          if [ -z "$SCHEME" ]; then
            SCHEME=$(echo "$SCHEMES" | head -1)
          fi

          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Detected scheme: $SCHEME"

      - name: Build unsigned .app with xcodebuild
        working-directory: mobile/ios
        env:
          BUILD_ARG: "${{ steps.detect.outputs.use_workspace == 'true' && format('-workspace {0}', steps.detect.outputs.workspace_path) || format('-project {0}', steps.detect.outputs.project_path) }}"
        run: |
          xcodebuild \
            $BUILD_ARG \
            -scheme "${{ steps.detect.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tail -30

      - name: Locate .app and pack unsigned IPA
        working-directory: mobile
        run: |
          IOS_DIR="ios"
          APP_PATH=$(find "$IOS_DIR/build/Build/Products/Release-iphoneos" \
            -maxdepth 1 -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "$IOS_DIR/build" -name "*.app" -type d -path "*/Release-iphoneos/*" | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "::error::.app not found. Listing build directory:"
            find "$IOS_DIR/build" -type d | head -40
            exit 1
          fi

          echo "Found .app: $APP_PATH"

          rm -rf release
          mkdir -p release

          TEMP_DIR="release/tmp"
          mkdir -p "$TEMP_DIR/Payload"
          cp -R "$APP_PATH" "$TEMP_DIR/Payload/"

          cd "$TEMP_DIR"
          zip -rq "../$APP_NAME-unsigned.ipa" Payload
          cd ../..
          rm -rf "$TEMP_DIR"

          echo "IPA created: release/$APP_NAME-unsigned.ipa"
          ls -lh "release/$APP_NAME-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-ios-unsigned-ipa
          path: mobile/release/${{ env.APP_NAME }}-unsigned.ipa
          retention-days: 7
